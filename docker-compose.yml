# docker-compose.yml
# AMORIA - Virtual Human dengan Jiwa
# Docker Compose for local development

version: '3.8'

services:
  amoria:
    build: .
    container_name: amoria
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./backups:/app/backups
    environment:
      - TZ=Asia/Jakarta
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - amoria-network

networks:
  amoria-network:
    driver: bridge
